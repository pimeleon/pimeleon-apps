---
# Build builder container images and cross-compiled ARM packages, then publish
# as GitHub Releases.
#
# Triggers:
#   push to main   — when versions/**, packages/**, or containers/** change
#   workflow_dispatch — manual run; optional `package` input filters which
#                       package to build (empty = all)
#
# Jobs:
#   build-containers  — rebuild builder Docker images when their Dockerfile changes
#   build-packages    — cross-compile ARM tarballs via docker create/cp/start
#   publish           — create/update GitHub Releases and attach assets

name: Build and Publish

on:
  push:
    branches: [main]
    paths:
      - 'versions/**'
      - 'packages/**'
      - 'containers/**'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to build (leave empty for all)'
        required: false
        default: ''

permissions:
  contents: write
  packages: write

env:
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  # ── Builder container images ─────────────────────────────────────────────────
  build-containers:
    name: Build container (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [armhf, arm64]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Dockerfile changes
        id: changes
        run: |
          # Always rebuild on workflow_dispatch or initial push (no before SHA)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BEFORE" "${{ github.sha }}" \
              | grep -q "^containers/builder-${{ matrix.arch }}/"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        if: steps.changes.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push builder image
        if: steps.changes.outputs.changed == 'true'
        env:
          DOCKER_BUILDKIT: '1'
        run: |
          IMAGE="${{ env.IMAGE_BASE }}/builder-${{ matrix.arch }}:latest"
          docker pull "${IMAGE}" || true
          docker build \
            --cache-from "${IMAGE}" \
            -t "${IMAGE}" \
            -f "containers/builder-${{ matrix.arch }}/Dockerfile" .
          docker push --quiet "${IMAGE}"

  # ── Package builds ───────────────────────────────────────────────────────────
  build-packages:
    name: Build ${{ matrix.package }} (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [build-containers]
    strategy:
      fail-fast: false
      matrix:
        package: [dnscrypt-proxy, tor]
        arch: [armhf, arm64]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine whether to build
        id: gate
        run: |
          PKG="${{ matrix.package }}"
          ARCH="${{ matrix.arch }}"
          EVENT="${{ github.event_name }}"
          INPUT_PKG="${{ inputs.package }}"

          if [ "$EVENT" = "workflow_dispatch" ]; then
            if [ -z "$INPUT_PKG" ] || [ "$INPUT_PKG" = "$PKG" ]; then
              echo "proceed=true" >> "$GITHUB_OUTPUT"
            else
              echo "proceed=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}")
          if echo "$CHANGED" | grep -qE "^(versions/${PKG}-${ARCH}\.version|packages/${PKG}/)"; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read version
        if: steps.gate.outputs.proceed == 'true'
        id: ver
        run: |
          echo "version=$(cat "versions/${{ matrix.package }}-${{ matrix.arch }}.version")" \
            >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: steps.gate.outputs.proceed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package
        if: steps.gate.outputs.proceed == 'true'
        run: |
          IMAGE="${{ env.IMAGE_BASE }}/builder-${{ matrix.arch }}:latest"
          VERSION="${{ steps.ver.outputs.version }}"
          mkdir -p output

          CONTAINER_ID=$(docker create \
            -e PACKAGE_NAME="${{ matrix.package }}" \
            -e PACKAGE_VERSION="${VERSION}" \
            -e TARGET_ARCH="${{ matrix.arch }}" \
            -e OUTPUT_DIR=/output \
            "${IMAGE}")
          docker cp "packages/${{ matrix.package }}/." "${CONTAINER_ID}:/package/"
          docker cp scripts/. "${CONTAINER_ID}:/scripts/"
          docker start -a "${CONTAINER_ID}"
          EXIT_CODE=$(docker inspect "${CONTAINER_ID}" --format='{{.State.ExitCode}}')
          docker cp "${CONTAINER_ID}:/output/." output/ || true
          docker rm "${CONTAINER_ID}"
          [ "${EXIT_CODE}" -eq 0 ] || exit 1

      - name: Upload build artifacts
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-${{ matrix.arch }}
          path: |
            output/*.tar.gz
            output/*.sha256
          retention-days: 14

  # ── Publish ──────────────────────────────────────────────────────────────────
  publish:
    name: Publish GitHub Releases
    runs-on: ubuntu-latest
    needs: [build-packages]
    if: ${{ !failure() && !cancelled() }}
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Releases and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s globstar nullglob
          tarballs=(artifacts/**/*.tar.gz)

          if [ "${#tarballs[@]}" -eq 0 ]; then
            echo "No artifacts to publish"
            exit 0
          fi

          for file in "${tarballs[@]}"; do
            BASENAME=$(basename "${file}")
            # Parse: {package}-{version}-{arch}-pimeleon.tar.gz
            # e.g.   dnscrypt-proxy-2.1.15-armhf-pimeleon.tar.gz
            PKGNAME=$(echo "${BASENAME}" | sed 's/-[0-9].*//')
            VERSION=$(echo "${BASENAME}" | sed "s/^${PKGNAME}-//" | sed 's/-arm.*//')
            ARCH=$(echo "${BASENAME}" | grep -oE 'arm(hf|64)')
            TAG="${PKGNAME}-${ARCH}-v${VERSION}"

            echo "Publishing ${PKGNAME} ${VERSION} (${ARCH}) → ${TAG}"

            if ! gh release view "${TAG}" > /dev/null 2>&1; then
              gh release create "${TAG}" \
                --target main \
                --title "${PKGNAME} ${ARCH} v${VERSION}" \
                --notes "Automated build of ${PKGNAME} ${VERSION} for ${ARCH}"
            fi

            gh release upload "${TAG}" "${file}" --clobber

            if [ -f "${file}.sha256" ]; then
              gh release upload "${TAG}" "${file}.sha256" --clobber
            fi

            echo "Released: ${TAG}"
          done
