---
name: Pimeleon Factory

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── PREPARE: Builder Images ────────────────────────────────────────────────
  prepare:
    name: Prepare Builder (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch: [armhf, arm64]
    outputs:
      image_armhf: ${{ steps.image_name.outputs.armhf }}
      image_arm64: ${{ steps.image_name.outputs.arm64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set Image Name
        id: image_name
        run: |
          LOWER_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/${LOWER_REPO}/builder-${{ matrix.arch }}:latest" >> $GITHUB_ENV

      - name: Check for Changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            builder:
              - 'containers/builder-${{ matrix.arch }}/**'
              - 'scripts/publish-builders.sh'
              - 'scripts/update-tools.sh'
              - 'versions/tools.yml'

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        if: steps.changes.outputs.builder == 'true' || github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: containers/builder-${{ matrix.arch }}/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=registry,ref=${{ env.IMAGE }}
          cache-to: type=inline

  # ── VERIFY: Gate (Lint, Security, Smoke) ───────────────────────────────────
  verify:
    name: Verify (${{ matrix.check }})
    runs-on: ubuntu-latest
    # Skip verification on direct master push (assume verified by MR)
    if: github.ref != 'refs/heads/master'
    needs: [prepare]
    strategy:
      matrix:
        check: [lint, smoke-armhf, smoke-arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # --- LINT CHECK ---
      - name: Lint (Shell/YAML)
        if: matrix.check == 'lint'
        run: |
          sudo apt-get install -y shellcheck yamllint jq python3 python3-pip
          yamllint -c .yamllint .
          python3 -m pip install --quiet bashate semgrep
          ./scripts/quality-benchmark.sh

      # --- SMOKE CHECKS ---
      - name: Smoke Test (Environment)
        if: startsWith(matrix.check, 'smoke')
        run: |
          ARCH=$(echo "${{ matrix.check }}" | cut -d'-' -f2)
          LOWER_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${LOWER_REPO}/builder-${ARCH}:latest"

          echo "Pulling ${IMAGE}..."
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull "${IMAGE}"
          docker run --rm "${IMAGE}" go version

  # ── RELEASE: Production Build ──────────────────────────────────────────────
  release:
    name: Production Build & Publish
    runs-on: ubuntu-latest
    # Only run on version tags (created by GitLab go-semrel-gitlab)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [prepare]
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build All Packages
        run: |
          # Define Image Base for local-build script override
          LOWER_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          export CI_REGISTRY_IMAGE="ghcr.io/${LOWER_REPO}"

          # Install dependencies for the orchestrator script
          sudo apt-get install -y bash curl

          # Run the build orchestrator (same as GitLab)
          ./local-build.sh all armhf
          ./local-build.sh all arm64

      - name: Publish Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          ./scripts/ci-publish-github.sh
