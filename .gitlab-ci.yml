---
# pimeleon-apps — GitLab CI/CD entry point
# Lightweight pipeline: lint + security + upstream version checking + smoke build.
# Full package builds and publishing run on production branches (master).

include:
  - local: '.gitlab/ci/stages.yml'
  - local: '.gitlab/ci/variables.yml'
  - local: '.gitlab/ci/templates.yml'
  - local: '.gitlab/ci/workflow.yml'
  - local: '.gitlab/ci/validate.yml'
  - local: '.gitlab/ci/security.yml'
  - local: '.gitlab/ci/check-versions.yml'
  - local: '.gitlab/ci/build-apps.yml'
  - local: '.gitlab/ci/publish.yml'
