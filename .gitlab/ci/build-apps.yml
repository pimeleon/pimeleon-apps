---

build:apps:
  stage: build-apps
  image: docker:latest
  tags:
    - containers
  interruptible: true
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  parallel:
    matrix:
      - TARGET_ARCH: ["armhf", "arm64"]
  script:
    - export http_proxy=$APT_PROXY
    - export https_proxy=$APT_PROXY
    - apk add --no-cache bash curl
    - chmod +x local-build.sh
    - ./local-build.sh all $TARGET_ARCH
  artifacts:
    paths:
      - output/
      - logs/
    expire_in: 1 week
    when: on_success
  rules:
    # Build release artifacts on develop and master pushes, but only when app-relevant inputs changed
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^(develop|master)$/'
      changes: !reference [.app_rebuild_globs, changes]

    # Verify production-bound app changes during merge requests to develop and master
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^(develop|master)$/'
      changes: !reference [.app_rebuild_globs, changes]
