---

build:apps:
  stage: build-apps
  image: docker:latest
  tags:
    - containers
  interruptible: true
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  parallel:
    matrix:
      - TARGET_ARCH: ["armhf", "arm64"]
  script:
    - apk add --no-cache bash curl
    - chmod +x local-build.sh
    - ./local-build.sh all $TARGET_ARCH
  artifacts:
    paths:
      - output/
      - logs/
    expire_in: 1 week
    when: on_success
  rules:
    # PRODUCTION: Full compilation only on MR targeting master
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master"'
