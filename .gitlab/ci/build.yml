---
# GitLab CI/CD — Build & Verification

build:smoke:
  stage: build
  image: docker:latest
  tags:
    - containers
  needs:
    - job: "lint:shell"
    - job: "lint:yaml"
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  script:
    # Basic verification: Ensure the builder environment can be initialized
    - apk add --no-cache make bash curl
    - make refresh-tools
    - make factory-init TARGET_ARCH=$DEFAULT_ARCH
  artifacts:
    paths:
      - logs/
      - output/
    expire_in: 1 week
    when: always
  rules:
    # Run on develop branch push
    - if: '$CI_COMMIT_BRANCH == "develop"'
    # Run on MRs targeting develop (or any branch except master)
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME != "master"'

# Full build for production branch (master) or MRs targeting master
build:all:
  stage: build
  image: docker:latest
  tags:
    - containers
  needs:
    - job: "lint:shell"
    - job: "lint:yaml"
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  script:
    - apk add --no-cache make bash curl
    - make refresh-tools
    - make factory-init TARGET_ARCH=$DEFAULT_ARCH
    - ./local-build.sh all $DEFAULT_ARCH
  artifacts:
    paths:
      - output/
      - logs/
    expire_in: 1 week
    when: always
  rules:
    # Run on direct push or merge to master
    - if: '$CI_COMMIT_BRANCH == "master"'
    # Run on MRs targeting master to verify full build before merge
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master"'
