---
# GitLab CI/CD — Build & Verification

build:smoke:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  tags:
    - linux
    - heavyweight
  needs:
    - job: "lint:shell"
    - job: "lint:yaml"
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    # Basic verification: Ensure the builder environment can be initialized
    - apk add --no-cache make bash
    - make refresh-tools
    - make factory-init TARGET_ARCH=armhf
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
