---
# GitLab CI/CD — Build & Verification

build:smoke:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  tags:
    - containers
  needs:
    - job: "lint:shell"
    - job: "lint:yaml"
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    # Basic verification: Ensure the builder environment can be initialized
    - apk add --no-cache make bash curl
    - make refresh-tools
    - make factory-init TARGET_ARCH=$DEFAULT_ARCH
  artifacts:
    paths:
      - logs/
      - output/
    expire_in: 1 week
    when: always
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

build:all:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  tags:
    - docker
    - heavyweight
  needs:
    - job: "lint:shell"
    - job: "lint:yaml"
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - apk add --no-cache make bash curl
    - make refresh-tools
    - make factory-init TARGET_ARCH=$DEFAULT_ARCH
    - ./local-build.sh all $DEFAULT_ARCH
  artifacts:
    paths:
      - logs/
      - output/
    expire_in: 1 week
    when: always
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH == "main"'
