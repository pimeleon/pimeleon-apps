---
# GitLab CI/CD — Build & Verification

build:all:
  stage: build:apps
  image: docker:latest
  tags:
    - containers
  interruptible: true
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  parallel:
    matrix:
      - TARGET_ARCH: ["armhf", "arm64"]
  script:
    - apk add --no-cache bash curl
    - chmod +x local-build.sh
    - ./local-build.sh all $TARGET_ARCH
  artifacts:
    paths:
      - output/
      - logs/
    expire_in: 1 week
    when: on_success
  rules:
    # PRODUCTION: Full compilation ONLY on the actual master branch (Merge or Hotfix)
    - if: '($CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop") && $CI_PIPELINE_SOURCE == "push"'

# Template for builder image creation
.build_builder_base:
  image: docker:latest
  services:
    - docker:dind
  tags:
    - containers
  needs:
    - job: "check:upstream-versions"
      optional: true
    - job: "security:gitleaks"
      optional: true
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    GITLAB_FETCH_TOKEN: ${GITLAB_FETCH_TOKEN}
  rules:
    # 1. Always run on master (ensure production images are fresh/pushed)
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: always

    # 2. On develop or other branches: Only run if builder sources actually changed
    - if: '$CI_COMMIT_BRANCH == "develop"'
      changes:
        - Dockerfile.builder
        - .env
        - .github/**/*
        - .gitlab/**/*
        - scripts/*

    # 3. Always run on manual trigger from web/schedule
    - if: '$CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "schedule"'
  script:
    - apk add --no-cache bash curl
    - chmod +x scripts/publish-builders.sh
    - ./scripts/publish-builders.sh $TARGET_ARCH

build:builder-armhf:
  extends: .build_builder_base
  stage: build:builder
  variables:
    TARGET_ARCH: "armhf"

build:builder-arm64:
  extends: .build_builder_base
  stage: build:builder
  variables:
    TARGET_ARCH: "arm64"
