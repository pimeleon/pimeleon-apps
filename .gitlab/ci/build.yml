---
# GitLab CI/CD — Build & Verification

build:smoke:
  stage: prepare
  image: docker:latest
  tags:
    - containers
  needs: []
  interruptible: true
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  parallel:
    matrix:
      - TARGET_ARCH: ["armhf", "arm64"]
  script:
    - REGISTRY_IMAGE="${CI_REGISTRY_IMAGE:-gitlab.pirouter.dev:5005/pimeleon/pi-router-apps}/builder-${TARGET_ARCH}:latest"
    - if [[ -n "${CI_JOB_TOKEN:-}" ]]; then echo "${CI_JOB_TOKEN}" | docker login "${CI_REGISTRY:-gitlab.pirouter.dev:5005}" -u gitlab-ci-token --password-stdin >/dev/null 2>&1; fi
    - docker pull "${REGISTRY_IMAGE}"
    - docker run --rm "${REGISTRY_IMAGE}" go version
  rules:
    # PRELIMINARY: Verify environment on Develop push and ALL Merge Requests (Gate)
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

build:all:
  stage: build
  image: docker:latest
  tags:
    - containers
  needs:
    - job: "lint:shell"
      optional: true
    - job: "lint:yaml"
      optional: true
  interruptible: true
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  parallel:
    matrix:
      - TARGET_ARCH: ["armhf", "arm64"]
  script:
    - ./local-build.sh all $TARGET_ARCH
  artifacts:
    paths:
      - output/
      - logs/
    expire_in: 1 week
    when: on_success
  rules:
    # PRODUCTION: Full compilation ONLY on the actual master branch (Merge or Hotfix)
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'
