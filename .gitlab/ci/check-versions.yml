---
# GitLab CI/CD — Upstream version detection
# Purpose: Identify dependency drift after integration into develop.

check:upstream-versions:
  stage: prepare
  image: alpine:latest
  tags:
    - linux
  needs: []
  rules:
    # Run after an MR is merged into develop
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE == "push"'
    # Always allow manual or scheduled checks
    - if: '$CI_PIPELINE_SOURCE == "schedule" || $CI_PIPELINE_SOURCE == "web"'
  script:
    - apk add --no-cache curl git python3 bash
    - git config user.email "ci-version-bot@pirouter.dev"
    - git config user.name "CI Version Bot"
    - git remote set-url origin
        "https://oauth2:${CI_PIMELEON_APPS_PUSH_TOKEN}@gitlab.pirouter.dev/pimeleon/pi-router-apps.git"
    - |
      CHANGED=0
      # Check for Go version updates
      ./scripts/update-tools.sh

      for pkg_dir in packages/*/; do
        [ -f "${pkg_dir}/package.env" ] || continue
        # shellcheck source=/dev/null
        source "${pkg_dir}/package.env"

        LATEST=$(bash scripts/check-upstream.sh \
            "${UPSTREAM_REPO}" \
            "${UPSTREAM_TYPE}" \
            "${UPSTREAM_GITLAB_HOST:-gitlab.com}" \
            "${UPSTREAM_TAG_PREFIX:-}" \
            "${UPSTREAM_TAG_PATTERN:-}" 2>/dev/null || true)

        if [ -z "${LATEST}" ]; then
          echo "[WARN] Could not determine upstream version for ${PACKAGE_NAME}, skipping"
          continue
        fi

        for arch in ${SUPPORTED_ARCHES}; do
          VERSION_FILE="versions/${PACKAGE_NAME}-${arch}.version"
          CURRENT=$(cat "${VERSION_FILE}" 2>/dev/null || echo "none")
          if [ "${LATEST}" != "${CURRENT}" ]; then
            echo "Update: ${PACKAGE_NAME} ${arch}: ${CURRENT} -> ${LATEST}"
            echo "${LATEST}" > "${VERSION_FILE}"
            git add "${VERSION_FILE}"
            CHANGED=1
          else
            echo "Up to date: ${PACKAGE_NAME} ${arch} @ ${LATEST}"
          fi
        done
      done

      if [ "${CHANGED}" = "1" ]; then
        # Ensure all new sources are pre-downloaded and cached in registry
        ./scripts/update-sources.sh

        git commit -m "chore(versions): update upstream package versions"
        git push origin HEAD:master
        echo "Pushed version updates — downstream pipeline will build affected packages"
      else
        # Always ensure current sources are cached
        ./scripts/update-sources.sh
        echo "All packages up to date, no changes committed"
      fi
  artifacts:
    paths:
      - versions/
    expire_in: 1 week
