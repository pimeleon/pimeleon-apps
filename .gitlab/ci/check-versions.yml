---
# GitLab CI/CD — Upstream version detection
# Purpose: Identify dependency drift after integration into develop.

check:upstream-versions:
  stage: validate
  image: alpine:latest
  tags:
    - linux
  needs: []
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ "/^(develop|master)$/"'
  script:
    - .gitlab/scripts/ci-check-versions.sh
