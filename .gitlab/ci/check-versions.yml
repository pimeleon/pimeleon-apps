---
# GitLab CI/CD — Upstream version detection
# Runs on schedule and web triggers. Detects new upstream releases and commits updated
# versions/*.version files to trigger package rebuild pipelines.

check:upstream-versions:
  stage: check
  image: alpine:latest
  tags:
    - linux
  needs: []
  interruptible: true
  retry: 2
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "master"'
  script:
    - apk add --no-cache curl git python3 bash
    - git config user.email "ci-version-bot@pirouter.dev"
    - git config user.name "CI Version Bot"
    - git remote set-url origin
        "https://oauth2:${CI_PIMELEON_APPS_PUSH_TOKEN}@gitlab.pirouter.dev/pimeleon/pi-router-apps.git"
    - ./scripts/check-upstream-versions.sh
  artifacts:
    paths:
      - versions/
    expire_in: 1 week
