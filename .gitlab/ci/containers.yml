---
# GitLab CI/CD — Builder Containers

# Template for builder image creation
.build_builder_base:
  stage: prepare
  image: docker:latest
  services:
    - docker:dind
  tags:
    - containers
  needs:
    - job: "check:upstream-versions"
      optional: true
    - job: "security:gitleaks"
      optional: true
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    GITLAB_FETCH_TOKEN: ${GITLAB_FETCH_TOKEN}
  rules:
    # 1. Always run on master (ensure production images are fresh/pushed)
    - if: '$CI_COMMIT_BRANCH == "master"'

    # 2. On develop or other branches: Only run if builder sources actually changed
    - if: '$CI_COMMIT_BRANCH == "develop"'
      changes:
        - scripts/update-tools.sh
        - scripts/publish-builders.sh

    # 3. Always run on manual trigger from web/schedule
    - if: '$CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "schedule"'

  script:
    - apk add --no-cache bash curl
    - chmod +x scripts/publish-builders.sh
    - ./scripts/publish-builders.sh $TARGET_ARCH

build:builder-armhf:
  extends: .build_builder_base
  variables:
    TARGET_ARCH: "armhf"

build:builder-arm64:
  extends: .build_builder_base
  variables:
    TARGET_ARCH: "arm64"
