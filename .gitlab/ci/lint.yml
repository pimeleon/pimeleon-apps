---
# GitLab CI/CD — Linting

lint:shell:
  stage: lint
  image: alpine:latest
  tags:
    - linux
  interruptible: true
  script:
    - apk add --no-cache shellcheck jq python3 py3-pip bash
    - python3 -m venv .venv && source .venv/bin/activate
    - pip install --no-cache-dir bashate semgrep
    - ./scripts/quality-benchmark.sh

lint:yaml:
  stage: lint
  image: alpine:latest
  tags:
    - linux
  interruptible: true
  script:
    - apk add --no-cache yamllint
    - yamllint -c .yamllint .
