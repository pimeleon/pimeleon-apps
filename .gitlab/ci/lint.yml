---
# GitLab CI/CD — Linting
# Purpose: Preliminary code quality checks for the development phase.

lint:shell:
  stage: lint
  image: alpine:latest
  tags:
    - linux
  needs:
    - job: "security:gitleaks"
  interruptible: true
  script:
    - apk add --no-cache shellcheck jq python3 py3-pip bash
    - python3 -m venv .venv && source .venv/bin/activate
    - pip install --no-cache-dir bashate semgrep
    - ./scripts/quality-benchmark.sh
  rules:
    # Run on direct push to develop
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE == "push"'
    # Run on MRs targeting develop (Verification Gate)
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'

lint:yaml:
  stage: lint
  image: alpine:latest
  tags:
    - linux
  needs: []
  interruptible: true
  script:
    - apk add --no-cache yamllint
    - yamllint -c .yamllint .
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
