---
# GitLab CI/CD — Linting

lint:shell:
  stage: lint
  image: lehcode/pimeleon-quality-bench:latest
  tags:
    - linux
  script:
    - ./scripts/quality-benchmark.sh

lint:yaml:
  stage: lint
  image: alpine:latest
  tags:
    - linux
  script:
    - apk add --no-cache yamllint
    - yamllint -c .yamllint .
