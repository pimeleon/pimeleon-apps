---
# GitLab CI/CD — Linting

lint:shell:
  stage: lint
  image: koalaman/shellcheck-alpine:latest
  tags:
    - linux
  needs: []
  script:
    - apk add --no-cache jq python3 py3-pip bash
    - python3 -m venv .venv && source .venv/bin/activate
    - pip install --no-cache-dir bashate semgrep
    - ./scripts/quality-benchmark.sh

lint:yaml:
  stage: lint
  image: alpine:latest
  tags:
    - linux
  needs: []
  script:
    - apk add --no-cache yamllint
    - yamllint -c .yamllint .
