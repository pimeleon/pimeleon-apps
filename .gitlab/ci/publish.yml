---
# GitLab CI/CD — Publishing
# Purpose: Final deployment of verified binaries to registries.

# Deploy built binaries to GitLab Generic Package Registry
publish:gitlab:
  stage: publish
  image: alpine:latest
  tags:
    - linux
  needs:
    - job: build:all
      artifacts: true
  interruptible: true
  rules:
    # PRODUCTION: Release artifacts ONLY on the actual master branch (Merge or Hotfix)
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'
  script:
    - apk add --no-cache curl bash
    - ./scripts/ci-publish-gitlab.sh

# Create GitLab Release on version tag
release:create:
  stage: release
  image:
    name: registry.gitlab.com/gitlab-org/release-cli:latest
    entrypoint: [""]
  tags:
    - linux
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - echo "Creating GitLab Release for ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "pi-router-apps ${CI_COMMIT_TAG}"
    description: |
      Release **${CI_COMMIT_TAG}**

      Packages available in the [Generic Package Registry](${CI_PROJECT_URL}/-/packages).
