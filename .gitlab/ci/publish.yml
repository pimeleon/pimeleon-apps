---
# GitLab CI/CD — Publishing
# Purpose: Final deployment of verified binaries to registries.

# Deploy built binaries to GitLab Generic Package Registry
publish:gitlab:
  stage: publish
  image: alpine:latest
  tags:
    - linux
  needs:
    - job: build:apps
      artifacts: true
      optional: true
    # - job: security:trivy:repo
    - job: security:scan-builder-armhf
    - job: security:scan-builder-arm64
  interruptible: true
  rules:
    # PRODUCTION: Upload artifacts only after merge to master, and only if app changes occurred
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'
      changes: !reference [.app_rebuild_globs, changes]
  script:
    - apk add --no-cache curl bash
    - ./scripts/ci-publish-gitlab.sh
  artifacts:
    reports:
      dotenv: publish.env

# Generate production semver tag from conventional commits since last release
tag:production:
  stage: tag
  image: node:lts-slim
  tags:
    - linux
  cache: {}
  needs:
    - job: security:gitleaks
    - job: lint:shell
    - job: lint:yaml
    - job: check:upstream-versions
    - job: security:scan-builder-armhf
    - job: security:scan-builder-arm64
    - job: publish:gitlab
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - when: never
  variables:
    GITLAB_URL: "https://gitlab.pirouter.dev"
    GITLAB_TOKEN: $CI_PIMELEON_APPS_PUSH_TOKEN
  before_script:
    - if [ -n "$APT_PROXY" ]; then echo "Acquire::http::Proxy \"$APT_PROXY\";" > /etc/apt/apt.conf.d/01proxy; fi
    - apt-get update && apt-get install -y git ca-certificates
    - if [ -n "$APT_PROXY" ]; then npm config set proxy "$APT_PROXY"; fi
    - if [ -n "$APT_PROXY" ]; then npm config set https-proxy "$APT_PROXY"; fi
    - npm install -g semantic-release @semantic-release/gitlab @semantic-release/commit-analyzer @semantic-release/release-notes-generator
  script:
    - semantic-release --extends @semantic-release/gitlab

# Trigger GitHub Actions after a successful production release
trigger:github:
  stage: downstream
  image: alpine:latest
  tags:
    - lightweight
  needs: []
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
      when: always
    - when: never
  before_script:
    - apk add --no-cache curl
  script:
    - chmod +x .gitlab/scripts/trigger-github.sh
    - .gitlab/scripts/trigger-github.sh

# Create GitLab Release on version tag
release:create:
  stage: tag
  image:
    name: registry.gitlab.com/gitlab-org/release-cli:latest
    entrypoint: [""]
  tags:
    - linux
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - echo "Creating GitLab Release for ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "pi-router-apps ${CI_COMMIT_TAG}"
    description: |
      Release **${CI_COMMIT_TAG}**

      Packages available in the [Generic Package Registry](${CI_PROJECT_URL}/-/packages).
