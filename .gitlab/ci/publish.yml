---
# GitLab CI/CD — Publishing
# Purpose: Final deployment of verified binaries to registries.

# Deploy built binaries to GitLab Generic Package Registry
publish:gitlab:
  stage: publish
  image: alpine:latest
  tags:
    - linux
  needs:
    - job: build:apps
      artifacts: true
      optional: true
    # - job: security:trivy:repo
    - job: security:scan-builder-armhf
    - job: security:scan-builder-arm64
  interruptible: true
  rules:
    # PRODUCTION: Upload artifacts only after merge to master, and only if app changes occurred
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'
      changes: !reference [.app_rebuild_globs, changes]
  script:
    - apk add --no-cache curl bash
    - ./scripts/ci-publish-gitlab.sh
  artifacts:
    reports:
      dotenv: publish.env

# Generate production semver tag from conventional commits since last release
tag:production:
  stage: tag
  image: registry.gitlab.com/juhani/go-semrel-gitlab:v0.21.1
  tags:
    - linux
  cache: {}
  before_script:
    - echo "Acquire::http::Proxy \"http://${APT_PROXY}/\";" > /etc/apt/apt.conf.d/01proxy
    - echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
    - echo "deb http://archive.debian.org/debian-security buster/updates main" >> /etc/apt/sources.list
    - apt-get update -qq 2>&1 | tail -1
    - DEBIAN_FRONTEND=noninteractive apt-get install -qq -y curl > /dev/null 2>&1
  needs:
    - job: security:gitleaks
    - job: lint:shell
    - job: lint:yaml
    - job: check:upstream-versions
    - job: security:scan-builder-armhf
    - job: security:scan-builder-arm64
    - job: publish:gitlab
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - when: never
  variables:
    GIT_SSL_NO_VERIFY: "1"
    GITLAB_URL: "https://gitlab.pirouter.dev/api/v4"
    GL_TOKEN: $CI_PIMELEON_APPS_PUSH_TOKEN
    GSG_MINOR_COMMIT_TYPES: "feat,perf"
    GSG_PATCH_COMMIT_TYPES: "fix"
  script:
    - .gitlab/scripts/ci-release.sh

# Trigger GitHub Actions after a successful production release
trigger:github:
  stage: downstream
  image: alpine:latest
  tags:
    - lightweight
  needs: []
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
      when: always
    - when: never
  before_script:
    - apk add --no-cache curl
  script:
    - chmod +x .gitlab/scripts/ci-trigger-github.sh
    - .gitlab/scripts/ci-trigger-github.sh
