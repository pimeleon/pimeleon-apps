---
# GitLab CI/CD — Publish tarballs to GitLab Generic Package Registry

publish:packages:
  stage: publish
  image: alpine/curl:latest
  tags:
    - linux
  needs:
    - job: build:dnscrypt-proxy:armhf
      artifacts: true
      optional: true
    - job: build:dnscrypt-proxy:arm64
      artifacts: true
      optional: true
    - job: build:tor:armhf
      artifacts: true
      optional: true
    - job: build:tor:arm64
      artifacts: true
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never
  script:
    - |
      ls output/*.tar.gz 2>/dev/null || { echo "No artifacts to publish"; exit 0; }
      for file in output/*.tar.gz; do
        BASENAME=$(basename "${file}")
        # Parse: {package}-{version}-{arch}-pimeleon.tar.gz
        # Examples: dnscrypt-proxy-2.1.15-armhf-pimeleon.tar.gz
        PKGNAME=$(echo "${BASENAME}" | sed 's/-[0-9].*//')
        VERSION=$(echo "${BASENAME}" | sed "s/^${PKGNAME}-//" | sed 's/-arm.*//')
        ARCH=$(echo "${BASENAME}" | grep -oE 'arm(hf|64)')

        echo "Publishing ${PKGNAME} ${VERSION} (${ARCH}): ${BASENAME}"
        curl --fail -sk \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "${file}" \
          "${PACKAGES_REGISTRY_URL}/${PKGNAME}/${ARCH}-${VERSION}/${BASENAME}"

        # Publish checksum if it exists
        if [ -f "${file}.sha256" ]; then
          curl --fail -sk \
            --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
            --upload-file "${file}.sha256" \
            "${PACKAGES_REGISTRY_URL}/${PKGNAME}/${ARCH}-${VERSION}/${BASENAME}.sha256"
        fi
      done
      echo "All artifacts published"
