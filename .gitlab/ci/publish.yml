---
# GitLab CI/CD — Publishing
# Purpose: Final deployment of verified binaries to production registry.

publish:gitlab:
  stage: publish
  image: alpine:latest
  tags:
    - linux
  needs:
    - job: build:all
      artifacts: true
  interruptible: true
  rules:
    # PRODUCTION: Release artifacts ONLY on the actual master branch (Merge or Hotfix)
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'
  script:
    - apk add --no-cache curl bash
    - ./scripts/ci-publish-gitlab.sh
