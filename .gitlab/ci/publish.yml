---
# GitLab CI/CD — Publishing
# Purpose: Final deployment of verified binaries to registries.

# Deploy built binaries to GitLab Generic Package Registry
publish:gitlab:
  stage: publish
  image: alpine:latest
  tags:
    - linux
  needs:
    - job: build:all
      artifacts: true
    - job: security:trivy:repo
      optional: true
    - job: security:scan-builder-armhf
      optional: true
    - job: security:scan-builder-arm64
      optional: true
  interruptible: true
  rules:
    # PRODUCTION: Upload artifacts on push to master OR on MR targeting master
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master"'
  script:
    - apk add --no-cache curl bash
    - ./scripts/ci-publish-gitlab.sh

# Create project-level semver tag on master (after artifacts are published)
release:production:
  stage: release
  image: registry.gitlab.com/juhani/go-semrel-gitlab:v0.21.1
  tags:
    - linux
  cache: {}
  needs:
    - job: publish:gitlab
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - when: never
  variables:
    GIT_SSL_NO_VERIFY: "1"
    GITLAB_URL: "https://gitlab.pirouter.dev/api/v4"
    GSG_TOKEN: $GITLAB_DEPLOY_TOKEN
    GSG_MINOR_COMMIT_TYPES: "feat,perf"
    GSG_PATCH_COMMIT_TYPES: "fix"
  script:
    - echo "Calculating next production version..."
    - NEXT_VERSION=$(release --skip-ssl-verify next-version --allow-current)
    - echo "Next version - ${NEXT_VERSION}"
    - |
      if [ -n "$NEXT_VERSION" ]; then
        echo "Creating release tag v${NEXT_VERSION}..."
        if ! release --skip-ssl-verify tag 2>&1 | tee /tmp/release.log; then
          if grep -q "no changes found" /tmp/release.log; then
            echo "No releasable changes - skipping tag"
          else
            cat /tmp/release.log
            exit 1
          fi
        fi
      else
        echo "No version bump needed"
      fi

# Create GitLab Release on version tag
release:create:
  stage: release
  image:
    name: registry.gitlab.com/gitlab-org/release-cli:latest
    entrypoint: [""]
  tags:
    - linux
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - echo "Creating GitLab Release for ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "pi-router-apps ${CI_COMMIT_TAG}"
    description: |
      Release **${CI_COMMIT_TAG}**

      Packages available in the [Generic Package Registry](${CI_PROJECT_URL}/-/packages).
