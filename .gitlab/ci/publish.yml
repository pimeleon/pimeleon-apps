---
# GitLab CI/CD — Publishing
# Purpose: Final deployment of verified binaries to registries.

# Deploy built binaries to GitLab Generic Package Registry
publish:gitlab:
  stage: publish
  image: alpine:latest
  tags:
    - linux
  needs:
    - job: build:apps
      artifacts: true
      optional: true
    # - job: security:trivy:repo
    - job: security:scan-builder-armhf
    - job: security:scan-builder-arm64
  interruptible: true
  rules:
    # PRODUCTION: Upload artifacts only after merge to master, and only if app changes occurred
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'
      changes: !reference [.app_rebuild_globs, changes]
  script:
    - apk add --no-cache curl bash
    - ./scripts/ci-publish-gitlab.sh

# Create project-level semver tag on master (after artifacts are published)
release:production:
  stage: release
  image: registry.gitlab.com/juhani/go-semrel-gitlab:v0.21.1
  tags:
    - linux
  cache: {}
  needs:
    - job: publish:gitlab
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - when: never
  variables:
    GIT_SSL_NO_VERIFY: "1"
    GITLAB_URL: "https://gitlab.pirouter.dev/api/v4"
    GSG_TOKEN: $GITLAB_DEPLOY_TOKEN
    GSG_MINOR_COMMIT_TYPES: "feat,perf"
    GSG_PATCH_COMMIT_TYPES: "fix"
  script:
    - .gitlab/scripts/ci-release.sh

# Create GitLab Release on version tag
release:create:
  stage: release
  image:
    name: registry.gitlab.com/gitlab-org/release-cli:latest
    entrypoint: [""]
  tags:
    - linux
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - echo "Creating GitLab Release for ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "pi-router-apps ${CI_COMMIT_TAG}"
    description: |
      Release **${CI_COMMIT_TAG}**

      Packages available in the [Generic Package Registry](${CI_PROJECT_URL}/-/packages).
