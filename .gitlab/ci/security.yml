---
# GitLab CI/CD — Security Scanning (Trivy + Gitleaks)

.trivy_base:
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  allow_failure: false
  variables:
    TRIVY_CACHE_DIR: ".trivycache/"
    TRIVY_NO_PROGRESS: "true"
    TRIVY_SEVERITY: "HIGH,CRITICAL"
    # Optimization: Use both vulnerability and secret scanners
    TRIVY_SCANNERS: "vuln,secret"
  tags:
    - linux
  cache:
    key: trivy-cache
    paths:
      - .trivycache/

# Base for Trivy image scans (requires docker to build/initialize the target image)
.trivy_image_base:
  stage: security
  image: docker:latest
  allow_failure: false
  tags:
    - containers
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    TRIVY_CACHE_DIR: ".trivycache/"
    TRIVY_NO_PROGRESS: "true"
    TRIVY_SEVERITY: "HIGH,CRITICAL"
    TRIVY_SCANNERS: "vuln,secret"
  before_script:
    - apk add --no-cache make bash curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  cache:
    key: trivy-cache
    paths:
      - .trivycache/

security:gitleaks:
  stage: security
  image:
    name: ghcr.io/gitleaks/gitleaks:latest
    entrypoint: [""]
  allow_failure: false
  tags:
    - linux
  needs: []
  script:
    # Gitleaks remains for deep git history scanning
    - gitleaks detect --source . --verbose --config gitleaks.toml --report-path gitleaks-report.json --staged || gitleaks detect --source . --verbose --config gitleaks.toml --report-path gitleaks-report.json
  artifacts:
    paths:
      - gitleaks-report.json
    expire_in: 1 week
    when: on_success
  interruptible: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

security:trivy:repo:
  extends: .trivy_base
  stage: security
  needs: []
  script:
    # Scan current FS for vulnerabilities and secrets
    # Generate report artifact but also stream to console for immediate feedback
    - trivy fs --ignore-unfixed --scanners ${TRIVY_SCANNERS} --format json --output trivy-repo-report.json .
    - trivy fs --ignore-unfixed --scanners ${TRIVY_SCANNERS} --format table --exit-code 1 .
  artifacts:
    paths:
      - trivy-repo-report.json
    expire_in: 1 week
    when: always
  interruptible: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master"'

# Pre-build image scans (initialize builder and scan before application build starts)
security:trivy:builder-armhf:
  extends: .trivy_image_base
  needs: []
  script:
    - make refresh-tools
    - make factory-init TARGET_ARCH=armhf
    # Generate report artifact but also stream to console for immediate feedback
    - trivy image --ignore-unfixed --scanners ${TRIVY_SCANNERS} --format json --output trivy-builder-armhf-report.json pimeleon-builder-armhf:latest
    - trivy image --ignore-unfixed --scanners ${TRIVY_SCANNERS} --format table --exit-code 1 pimeleon-builder-armhf:latest
  artifacts:
    paths:
      - trivy-builder-armhf-report.json
    expire_in: 1 week
    when: always
  interruptible: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master"'

security:trivy:builder-arm64:
  extends: .trivy_image_base
  needs: []
  script:
    - make refresh-tools
    - make factory-init TARGET_ARCH=arm64
    # Generate report artifact but also stream to console for immediate feedback
    - trivy image --ignore-unfixed --scanners ${TRIVY_SCANNERS} --format json --output trivy-builder-arm64-report.json pimeleon-builder-arm64:latest
    - trivy image --ignore-unfixed --scanners ${TRIVY_SCANNERS} --format table --exit-code 1 pimeleon-builder-arm64:latest
  artifacts:
    paths:
      - trivy-builder-arm64-report.json
    expire_in: 1 week
    when: always
  interruptible: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master"'
