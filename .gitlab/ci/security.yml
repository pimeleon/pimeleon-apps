---
# GitLab CI/CD — Security Scanning (Trivy + Gitleaks)

.trivy_base:
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  allow_failure: false
  variables:
    TRIVY_CACHE_DIR: ".trivycache/"
    TRIVY_NO_PROGRESS: "true"
    TRIVY_SEVERITY: "HIGH,CRITICAL"
    TRIVY_SCANNERS: "vuln,secret"
  tags:
    - linux
  cache:
    key: trivy-cache
    paths:
      - .trivycache/

security:gitleaks:
  stage: security
  image:
    name: ghcr.io/gitleaks/gitleaks:latest
    entrypoint: [""]
  allow_failure: false
  tags:
    - linux
  script:
    - gitleaks detect --source . --verbose --config gitleaks.toml --report-path gitleaks-report.json --staged || gitleaks detect --source . --verbose --config gitleaks.toml --report-path gitleaks-report.json
  artifacts:
    paths:
      - gitleaks-report.json
    expire_in: 1 week
    when: on_success
  interruptible: true
  rules:
    # PRELIMINARY: Only check secrets on Develop pushes and MRs targeting Develop
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'

security:scan-builder-armhf:
  extends: .trivy_base
  tags:
    - linux
  needs:
    - job: build:builder-armhf
      optional: true
  script:
    - IMAGE_NAME="${CI_REGISTRY_IMAGE}/builder-armhf:latest"
    - docker pull "${IMAGE_NAME}"
    - trivy image --ignore-unfixed --scanners ${TRIVY_SCANNERS} --format json --output trivy-builder-armhf-report.json "${IMAGE_NAME}"
    - trivy image --ignore-unfixed --scanners ${TRIVY_SCANNERS} --format table --exit-code 1 "${IMAGE_NAME}"
  artifacts:
    paths:
      - trivy-builder-armhf-report.json
    expire_in: 1 week
    when: always
  interruptible: true
  rules:
    # FINAL GATE: Check builder vulnerabilities on MRs to Master or direct Master push
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master"'
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'

security:scan-builder-arm64:
  extends: .trivy_base
  tags:
    - linux
  needs:
    - job: build:builder-arm64
      optional: true
  script:
    - IMAGE_NAME="${CI_REGISTRY_IMAGE}/builder-arm64:latest"
    - docker pull "${IMAGE_NAME}"
    - trivy image --ignore-unfixed --scanners ${TRIVY_SCANNERS} --format json --output trivy-builder-arm64-report.json "${IMAGE_NAME}"
    - trivy image --ignore-unfixed --scanners ${TRIVY_SCANNERS} --format table --exit-code 1 "${IMAGE_NAME}"
  artifacts:
    paths:
      - trivy-builder-arm64-report.json
    expire_in: 1 week
    when: always
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master"'
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'
