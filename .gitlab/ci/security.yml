---
# GitLab CI/CD — Security Scanning (Trivy + Gitleaks)

.trivy_base:
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  allow_failure: false
  variables:
    TRIVY_CACHE_DIR: ".trivycache/"
    TRIVY_NO_PROGRESS: "true"
    TRIVY_SEVERITY: "HIGH,CRITICAL"
    TRIVY_SCANNERS: "vuln,secret"
    TRIVY_SKIP_DIRS: "/usr/local/go"
    TRIVY_SKIP_FILES: "go.sum"
  tags:
    - linux
  cache:
    key: trivy-cache
    paths:
      - .trivycache/

security:scan-builder-armhf:
  extends: .trivy_base
  stage: security
  tags:
    - linux
  needs:
    - job: build:builder-armhf
      optional: true
  variables:
    TRIVY_USERNAME: $CI_REGISTRY_USER
    TRIVY_PASSWORD: $CI_REGISTRY_PASSWORD
  script:
    - .gitlab/scripts/ci-trivy-scan.sh armhf
  artifacts:
    paths:
      - trivy-builder-armhf-report.json
    expire_in: 1 week
    when: always
  interruptible: true
  rules:
    # FINAL GATE: Check builder vulnerabilities on MRs to Master or direct Master push
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master"'
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'

security:scan-builder-arm64:
  extends: .trivy_base
  stage: security
  tags:
    - linux
  needs:
    - job: build:builder-arm64
      optional: true
  variables:
    TRIVY_USERNAME: $CI_REGISTRY_USER
    TRIVY_PASSWORD: $CI_REGISTRY_PASSWORD
  script:
    - .gitlab/scripts/ci-trivy-scan.sh arm64
  artifacts:
    paths:
      - trivy-builder-arm64-report.json
    expire_in: 1 week
    when: always
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master"'
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'
