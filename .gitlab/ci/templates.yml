---
# GitLab CI/CD — Build & Verification

# Template for builder image creation
.build_builder_base:
  image: docker:latest
  services:
    - docker:dind
  tags:
    - containers
  needs:
    - job: "check:upstream-versions"
    - job: "security:gitleaks"
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    GITLAB_DEPLOY_TOKEN: ${GITLAB_DEPLOY_TOKEN}
  rules:
    # 1. Always run on develop and master (ensure production images are fresh/pushed)
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^(develop|master)$/'
      changes: !reference [.builder_rebuild_globs, changes]

    # 2. Run on MR to develop or master if builder sources changed (pre-merge gate)
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^(develop|master)$/'
      changes: !reference [.builder_rebuild_globs, changes]
  script:
    - apk add --no-cache bash curl
    - chmod +x scripts/publish-builders.sh
    - ./scripts/publish-builders.sh $TARGET_ARCH

build:builder-armhf:
  extends: .build_builder_base
  stage: build-builder
  variables:
    TARGET_ARCH: "armhf"

build:builder-arm64:
  extends: .build_builder_base
  stage: build-builder
  variables:
    TARGET_ARCH: "arm64"
