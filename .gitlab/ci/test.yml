build:smoke:
  stage: test
  image: docker:latest
  tags:
    - containers
  needs:
    - job: build:builder-armhf
      optional: true
    - job: build:builder-arm64
      optional: true
  interruptible: true
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  parallel:
    matrix:
      - TARGET_ARCH: ["armhf", "arm64"]
  script:
    - apk add --no-cache bash curl
    - REGISTRY_IMAGE="${CI_REGISTRY_IMAGE:-gitlab.pirouter.dev:5005/pimeleon/pi-router-apps}/builder-${TARGET_ARCH}:latest"
    - if [ -n "${CI_JOB_TOKEN:-}" ]; then echo "${CI_JOB_TOKEN}" | docker login "${CI_REGISTRY:-gitlab.pirouter.dev:5005}" -u gitlab-ci-token --password-stdin >/dev/null 2>&1; fi
    - docker pull "${REGISTRY_IMAGE}"
    - docker run --rm "${REGISTRY_IMAGE}" go version
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
