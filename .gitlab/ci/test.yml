build:smoke:
  stage: test
  image: docker:latest
  tags:
    - containers
  needs:
    - job: build:builder-armhf
      optional: true
    - job: build:builder-arm64
      optional: true
  interruptible: true
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  parallel:
    matrix:
      - TARGET_ARCH: ["armhf", "arm64"]
  script:
    - .gitlab/scripts/ci-smoke-test.sh
  rules:
    - if: '$CI_COMMIT_TAG'
    - when: always
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^(develop|master)$/'
      changes: !reference [.builder_rebuild_globs, changes]
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^(develop|master)$/'
      changes: !reference [.builder_rebuild_globs, changes]
