---
# GitLab CI/CD — Linting
# Purpose: Preliminary code quality checks for the development phase.

security:gitleaks:
  stage: validate
  image:
    name: ghcr.io/gitleaks/gitleaks:latest
    entrypoint: [""]
  allow_failure: false
  needs: []
  tags:
    - linux
  script:
    - .gitlab/scripts/ci-gitleaks.sh
  artifacts:
    paths:
      - gitleaks-report.json
    expire_in: 1 week
    when: on_success
  rules:
    - if: '$CI_COMMIT_TAG'
      when: always
    - if: '$CI_PIPELINE_SOURCE =~ /push|merge_request_event/'
      when: always


lint:shell:
  stage: validate
  image: alpine:latest
  tags:
    - linux
  needs:
    - job: "security:gitleaks"
  script:
    - .gitlab/scripts/ci-lint-shell.sh
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "push"'

lint:yaml:
  stage: validate
  image: alpine:latest
  tags:
    - linux
  needs:
    - job: "security:gitleaks"
  script:
    - .gitlab/scripts/ci-lint-yaml.sh
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "push"'
