---
# GitLab CI/CD — Architecture-Centric Workflow
stages:
  - lint
  - check
  - build

variables:
  GIT_DEPTH: 0
  DEFAULT_ARCH: "armhf"

workflow:
  rules:
    # Run on all push events, merge requests, web triggers, and schedules
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
