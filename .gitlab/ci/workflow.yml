---
# GitLab CI/CD — Architecture-Centric Workflow
stages:
  - security
  - lint
  - build
  - publish

variables:
  GIT_DEPTH: 0
  DEFAULT_ARCH: "armhf"
  QUIET: "1"

default:
  interruptible: true

workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    # Run on all push events, merge requests, web triggers, and schedules
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
