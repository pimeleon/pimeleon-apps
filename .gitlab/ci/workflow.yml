---
# GitLab CI/CD — Workflow, stages, and global variables

stages:
  - lint
  - check

variables:
  GIT_DEPTH: 0

default:
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  interruptible: true

workflow:
  rules:
    # Scheduled: version check only
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    # Push to main: lint only
    - if: '$CI_COMMIT_BRANCH == "main"'
    # Web-triggered: lint + version check
    - if: '$CI_PIPELINE_SOURCE == "web"'
    # MRs: lint only
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
