---
# GitLab CI/CD — Global Pipeline Rules
workflow:
  rules:
    # Run on all push events, merge requests, web triggers, and schedules
    # Job-level 'rules' will further filter which jobs run in each context.
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
