---
repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
        exclude: '\.md$'
      - id: check-yaml
        args: [--allow-multiple-documents, --unsafe]
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key

  # Shell script syntax validation
  - repo: local
    hooks:
      - id: bash-syntax
        name: Bash syntax check
        entry: bash -n
        language: system
        types: [shell]

  # Shell script linting
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.9.0
    hooks:
      - id: shellcheck
        args: ['-e', 'SC1091,SC2155,SC2086', '-S', 'error']

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.33.0
    hooks:
      - id: yamllint
        args: ['-c', '.yamllint']

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.38.0
    hooks:
      - id: markdownlint
        args: ['--config', '.markdownlint.json', '--fix']

  # Secret detection (pre-push only)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        stages: [pre-push]
        args: ['dir', '.', '--verbose', '--redact']

  # Code Quality Benchmark (pre-push only)
  - repo: local
    hooks:
      - id: quality-benchmark
        name: Code Quality Benchmark
        entry: ./scripts/quality-benchmark.sh
        language: script
        stages: [pre-push]
        pass_filenames: false
        always_run: true
        verbose: true

  # Integration tests for CI/CD shell scripts (pre-push only)
  - repo: local
    hooks:
      - id: cicd-integration-tests
        name: CI/CD Integration Tests
        entry: ./tests/cicd/test_ci_release_logic.sh
        language: script
        stages: [pre-push]
        pass_filenames: false
        always_run: true
        verbose: true
